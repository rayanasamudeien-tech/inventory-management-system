services:
  # Backend API Service
  - type: web
    name: inventory-backend
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString

  # Frontend Service
  - type: web
    name: inventory-frontend
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: inventory-backend
          property: host

# Database
databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user
    plan: free